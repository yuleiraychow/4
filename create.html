{% extends "base.html" %}
{% block title %}{% if mode == 'login' %}登录{% else %}注册{% endif %} — 活动广场{% endblock %}
{% block content %}

<div style="max-width:400px;margin:2rem auto;">
  <div class="card">
    <div class="card-body">
      <h2 style="font-size:18px;font-weight:500;margin-bottom:4px;">
        {% if mode == 'login' %}登录{% else %}注册{% endif %}
      </h2>
      <p style="font-size:13px;color:#888;margin-bottom:1.25rem;">
        登录后可发布活动、报名参加
      </p>

      <form method="post">
        <div class="form-group">
          <label class="form-label">昵称</label>
          <input class="form-control" type="text" name="name" placeholder="你的名字" required autofocus/>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input class="form-control" type="password" name="password" placeholder="至少4位" required/>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;margin-bottom:12px;">
          {% if mode == 'login' %}登录{% else %}注册{% endif %}
        </button>
      </form>

      <div style="text-align:center;font-size:13px;color:#888;">
        {% if mode == 'login' %}
          没有账号？<a href="/register" style="color:#185fa5;text-decoration:underline;">注册</a>
        {% else %}
          已有账号？<a href="/login" style="color:#185fa5;text-decoration:underline;">登录</a>
        {% endif %}
      </div>
    </div>
  </div>
</div>

{% endblock %}

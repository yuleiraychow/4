<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}活动广场{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; color: #1a1a1a; background: #f5f5f3; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    .navbar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 0 1rem; position: sticky; top: 0; z-index: 100; }
    .navbar-inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .navbar-brand { font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .navbar-actions { display: flex; gap: 8px; align-items: center; }

    .container { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

    .btn { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500; padding: 8px 16px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: #fff; color: #1a1a1a; transition: background 0.15s; text-decoration: none; }
    .btn:hover { background: #f5f5f3; }
    .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn-primary:hover { background: #333; }
    .btn-danger { border-color: #e24b4a; color: #a32d2d; }
    .btn-danger:hover { background: #fcebeb; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }

    .tag { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 8px; background: #f0f0ee; color: #666; border: 0.5px solid rgba(0,0,0,0.1); }
    .tag-active { background: #e6f1fb; color: #185fa5; border-color: #b5d4f4; }

    .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
    .card-body { padding: 1rem 1.25rem; }

    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #e6f1fb; color: #185fa5; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
    .form-control { width: 100%; padding: 9px 12px; font-size: 14px; font-family: inherit; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; transition: border-color 0.15s; }
    .form-control:focus { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
    textarea.form-control { min-height: 90px; resize: vertical; }
    select.form-control { cursor: pointer; }

    .alert { padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 14px; border: 0.5px solid; }
    .alert-success { background: #eaf3de; color: #3b6d11; border-color: #c0dd97; }
    .alert-info    { background: #e6f1fb; color: #185fa5; border-color: #b5d4f4; }
    .alert-danger  { background: #fcebeb; color: #a32d2d; border-color: #f7c1c1; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 14px 0; }

    .event-img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .event-card-img { width: 100%; height: 140px; object-fit: cover; display: block; }

    .progress-bar { height: 6px; background: #e8e8e6; border-radius: 3px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; background: #1a1a1a; border-radius: 3px; }

    .map-box { width: 100%; height: 240px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.1); overflow: hidden; }
    .map-hint { font-size: 12px; color: #888; margin-top: 4px; }

    .img-upload-area { width: 100%; padding: 2rem; border: 0.5px dashed rgba(0,0,0,0.25); border-radius: 8px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; color: #888; font-size: 14px; background: #fafaf8; }
    .img-upload-area:hover { background: #f0f0ee; }
    .img-preview { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.1); display: none; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-row .form-control { flex: 1; }

    @media(max-width:480px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="/">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      活动广场
    </a>
    <div class="navbar-actions">
      {% if user %}
        <a href="/create" class="btn btn-sm btn-primary">+ 发布活动</a>
        <span class="avatar" title="{{ user.name }}">{{ user.name[0] }}</span>
        <a href="/logout" class="btn btn-sm">退出</a>
      {% else %}
        <a href="/login" class="btn btn-sm">登录</a>
        <a href="/register" class="btn btn-sm btn-primary">注册</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
